<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHYSL DESIGN - Future Vision</title>
    <style>
        /* --- 基础设置 --- */
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff0055;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- 粗大线性湍流背景效果 --- */
        .turbulent-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }

        /* SVG 湍流滤镜 */
        .turbulence-svg {
            position: absolute;
            width: 0;
            height: 0;
        }

        /* 线性光带容器 */
        .light-streams {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        /* 单个粗大光带 */
        .stream {
            position: absolute;
            height: 150px; /* 粗大的光带 */
            width: 120%;
            left: -10%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(0, 242, 255, 0.3) 20%, 
                rgba(0, 242, 255, 0.8) 40%, 
                rgba(188, 19, 254, 0.9) 50%, 
                rgba(255, 0, 85, 0.8) 60%, 
                rgba(0, 242, 255, 0.3) 80%, 
                transparent 100%
            );
            filter: blur(30px); /* 柔和模糊 */
            box-shadow: 0 0 60px rgba(0, 242, 255, 0.5),
                        0 0 100px rgba(188, 19, 254, 0.3),
                        0 0 140px rgba(255, 0, 85, 0.2);
            animation: streamFlow 20s infinite ease-in-out; /* 缓慢流动 */
            opacity: 0.7;
            border-radius: 100px; /* 圆角让边缘更柔和 */
        }

        /* 不同位置和速度的光带 */
        .stream:nth-child(1) {
            top: 15%;
            animation-delay: 0s;
            animation-duration: 18s;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(0, 242, 255, 0.4) 20%, 
                rgba(188, 19, 254, 0.7) 50%, 
                rgba(0, 242, 255, 0.4) 80%, 
                transparent 100%
            );
        }

        .stream:nth-child(2) {
            top: 35%;
            animation-delay: -5s;
            animation-duration: 22s;
            height: 180px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(188, 19, 254, 0.4) 20%, 
                rgba(0, 242, 255, 0.8) 50%, 
                rgba(255, 0, 85, 0.6) 80%, 
                transparent 100%
            );
        }

        .stream:nth-child(3) {
            top: 55%;
            animation-delay: -10s;
            animation-duration: 20s;
            height: 160px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 0, 85, 0.4) 20%, 
                rgba(0, 242, 255, 0.7) 50%, 
                rgba(188, 19, 254, 0.6) 80%, 
                transparent 100%
            );
        }

        .stream:nth-child(4) {
            top: 75%;
            animation-delay: -15s;
            animation-duration: 24s;
            height: 140px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(0, 242, 255, 0.3) 20%, 
                rgba(255, 0, 85, 0.7) 50%, 
                rgba(0, 242, 255, 0.3) 80%, 
                transparent 100%
            );
        }

        /* 流动动画 - 缓慢波浪状移动 */
        @keyframes streamFlow {
            0% {
                transform: translateX(-5%) translateY(0) scaleX(1);
                opacity: 0.6;
            }
            25% {
                transform: translateX(5%) translateY(-20px) scaleX(1.05);
                opacity: 0.8;
            }
            50% {
                transform: translateX(10%) translateY(0) scaleX(1);
                opacity: 0.7;
            }
            75% {
                transform: translateX(0%) translateY(20px) scaleX(0.95);
                opacity: 0.8;
            }
            100% {
                transform: translateX(-5%) translateY(0) scaleX(1);
                opacity: 0.6;
            }
        }

        /* 额外的光晕层 */
        .glow-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, 
                rgba(0, 242, 255, 0.15) 0%, 
                rgba(188, 19, 254, 0.1) 30%, 
                transparent 70%
            );
            animation: glowPulse 8s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes glowPulse {
            0%, 100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        /* 噪点纹理层 */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        /* --- 前景内容卡片 (玻璃拟态) --- */
        .content-card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 4rem 6rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 800px;
            transition: transform 0.3s ease;
        }

        .content-card:hover {
            transform: translateY(-5px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        /* 顶部小字 */
        .top-label {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: block;
        }

        .year-badge {
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-right: 10px;
            vertical-align: middle;
        }

        /* 主标题 */
        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin: 0.5rem 0;
            background: linear-gradient(to right, #fff, #a5a5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        /* 副标题 */
        .subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--neon-blue);
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 25px rgba(0, 242, 255, 0.6);
        }

        /* 描述文本 */
        p.description {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.95rem;
            max-width: 600px;
            margin: 0 auto 3rem auto;
        }

        /* 按钮 */
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
        }

        .btn:hover::before {
            left: 100%;
        }

        /* 底部装饰线 */
        .footer-line {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.6));
            animation: pulseLine 1.5s infinite;
        }

        @keyframes pulseLine {
            0%, 100% { opacity: 0.4; height: 40px; }
            50% { opacity: 1; height: 60px; }
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .content-card { padding: 3rem 2rem; width: 90%; }
            .stream { height: 100px; }
        }
    </style>
</head>
<body>

    <!-- SVG 湍流滤镜定义 -->
    <svg class="turbulence-svg">
        <defs>
            <filter id="turbulence">
                <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="turbulence" />
                <feDisplacementMap in2="turbulence" in="SourceGraphic" scale="30" xChannelSelector="R" yChannelSelector="G" />
                <feGaussianBlur stdDeviation="2" />
            </filter>
        </defs>
    </svg>

    <!-- 线性湍流背景层 -->
    <div class="turbulent-light">
        <div class="light-streams">
            <div class="stream"></div>
            <div class="stream"></div>
            <div class="stream"></div>
            <div class="stream"></div>
        </div>
        <div class="glow-overlay"></div>
    </div>
    
    <!-- 噪点层 -->
    <div class="noise-overlay"></div>

    <!-- 主要内容 -->
    <main class="content-card">
        <span class="top-label">
            <span class="year-badge">2025</span> VISUAL DESIGN BY WHYSL
        </span>
        
        <h1>WHYSL DESIGN</h1>
        
        <div class="subtitle">Draw The Color Of The Dream</div>
        
        <p class="description">
            探索视觉的边界，捕捉光影的流动。我们致力于创造超越现实的数字体验，
            将霓虹梦境转化为触手可及的视觉艺术。
            <br><br>
            Explore the boundaries of vision and capture the flow of light and shadow.
        </p>
        
        <a href="#" class="btn">ENTER THE DREAM</a>
    </main>

    <!-- 底部装饰 -->
    <div class="footer-line"></div>

    <script>
        // 鼠标交互效果 - 轻微影响光带
        document.addEventListener('mousemove', (e) => {
            const streams = document.querySelectorAll('.stream');
            const x = (e.clientX - window.innerWidth / 2) / 200;
            const y = (e.clientY - window.innerHeight / 2) / 200;

            streams.forEach((stream, index) => {
                const speed = (index % 2 + 1) * 0.3;
                const offsetX = x * speed;
                const offsetY = y * speed;
                stream.style.marginLeft = offsetX + 'px';
                stream.style.marginTop = offsetY + 'px';
            });

            const glowOverlay = document.querySelector('.glow-overlay');
            glowOverlay.style.transform = `translate(${x * 2}px, ${y * 2}px) scale(1.05)`;
        });
    </script>
</body>
</html>
