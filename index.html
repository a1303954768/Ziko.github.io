<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHYSL DESIGN - Future Vision</title>
    <style>
        /* --- 基础设置 --- */
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff0055;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- 极光背景效果 --- */
        .aurora-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }

        /* 极光带容器 */
        .aurora-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* 极光带 */
        .aurora-band {
            position: absolute;
            width: 200%;
            height: 400px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(0, 242, 255, 0.3) 15%, 
                rgba(0, 242, 255, 0.7) 30%, 
                rgba(188, 19, 254, 0.9) 50%, 
                rgba(255, 0, 85, 0.7) 70%, 
                rgba(0, 242, 255, 0.3) 85%, 
                transparent 100%
            );
            filter: blur(80px);
            border-radius: 300px;
            opacity: 0.6;
            animation: auroraFlow 30s infinite linear;
        }

        /* 第一条极光 */
        .aurora-band:nth-child(1) {
            top: 10%;
            left: -50%;
            transform: rotate(-10deg);
            animation-duration: 35s;
            height: 450px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(0, 242, 255, 0.4) 20%, 
                rgba(188, 19, 254, 0.8) 50%, 
                rgba(0, 242, 255, 0.4) 80%, 
                transparent 100%
            );
        }

        /* 第二条极光 */
        .aurora-band:nth-child(2) {
            top: 50%;
            left: -50%;
            transform: rotate(5deg);
            animation-duration: 40s;
            animation-delay: -15s;
            height: 500px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 0, 85, 0.3) 20%, 
                rgba(0, 242, 255, 0.8) 50%, 
                rgba(188, 19, 254, 0.6) 80%, 
                transparent 100%
            );
        }

        /* 极光流动动画 - 无缝循环 */
        @keyframes auroraFlow {
            0% {
                transform: translateX(0) translateY(0) rotate(-10deg) scaleX(1);
            }
            25% {
                transform: translateX(25%) translateY(-30px) rotate(-8deg) scaleX(1.05);
            }
            50% {
                transform: translateX(50%) translateY(0) rotate(-6deg) scaleX(1);
            }
            75% {
                transform: translateX(75%) translateY(30px) rotate(-4deg) scaleX(0.95);
            }
            100% {
                transform: translateX(100%) translateY(0) rotate(-10deg) scaleX(1);
            }
        }

        /* 第二条极光的动画 */
        .aurora-band:nth-child(2) {
            animation-name: auroraFlow2;
        }

        @keyframes auroraFlow2 {
            0% {
                transform: translateX(0) translateY(0) rotate(5deg) scaleX(1);
            }
            25% {
                transform: translateX(25%) translateY(40px) rotate(7deg) scaleX(1.08);
            }
            50% {
                transform: translateX(50%) translateY(0) rotate(9deg) scaleX(1);
            }
            75% {
                transform: translateX(75%) translateY(-40px) rotate(11deg) scaleX(0.92);
            }
            100% {
                transform: translateX(100%) translateY(0) rotate(5deg) scaleX(1);
            }
        }

        /* 极光光晕层 */
        .aurora-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 40%, 
                rgba(0, 242, 255, 0.2) 0%, 
                transparent 60%
            ),
            radial-gradient(ellipse at 80% 60%, 
                rgba(188, 19, 254, 0.15) 0%, 
                transparent 60%
            ),
            radial-gradient(ellipse at 50% 80%, 
                rgba(255, 0, 85, 0.1) 0%, 
                transparent 50%
            );
            filter: blur(60px);
            animation: glowPulse 12s infinite ease-in-out;
        }

        @keyframes glowPulse {
            0%, 100% {
                opacity: 0.6;
                transform: scale(1);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.1);
            }
        }

        /* 波浪变形效果 */
        .aurora-wave {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            animation: waveMove 20s infinite linear;
        }

        @keyframes waveMove {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 200% 50%;
            }
        }

        /* 噪点纹理层 */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        /* --- 前景内容卡片 (玻璃拟态) --- */
        .content-card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 4rem 6rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 800px;
            transition: transform 0.3s ease;
        }

        .content-card:hover {
            transform: translateY(-5px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        /* 顶部小字 */
        .top-label {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: block;
        }

        .year-badge {
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-right: 10px;
            vertical-align: middle;
        }

        /* 主标题 */
        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin: 0.5rem 0;
            background: linear-gradient(to right, #fff, #a5a5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        /* 副标题 */
        .subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--neon-blue);
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 25px rgba(0, 242, 255, 0.6);
        }

        /* 描述文本 */
        p.description {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.95rem;
            max-width: 600px;
            margin: 0 auto 3rem auto;
        }

        /* 按钮 */
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
        }

        .btn:hover::before {
            left: 100%;
        }

        /* 底部装饰线 */
        .footer-line {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.6));
            animation: pulseLine 1.5s infinite;
        }

        @keyframes pulseLine {
            0%, 100% { opacity: 0.4; height: 40px; }
            50% { opacity: 1; height: 60px; }
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .content-card { padding: 3rem 2rem; width: 90%; }
            .aurora-band { height: 250px; }
        }
    </style>
</head>
<body>

    <!-- 极光背景层 -->
    <div class="aurora-light">
        <div class="aurora-container">
            <div class="aurora-band"></div>
            <div class="aurora-band"></div>
        </div>
        <div class="aurora-glow"></div>
    </div>
    
    <!-- 噪点层 -->
    <div class="noise-overlay"></div>

    <!-- 主要内容 -->
    <main class="content-card">
        <span class="top-label">
            <span class="year-badge">2025</span> VISUAL DESIGN BY WHYSL
        </span>
        
        <h1>WHYSL DESIGN</h1>
        
        <div class="subtitle">Draw The Color Of The Dream</div>
        
        <p class="description">
            探索视觉的边界，捕捉光影的流动。我们致力于创造超越现实的数字体验，
            将霓虹梦境转化为触手可及的视觉艺术。
            <br><br>
            Explore the boundaries of vision and capture the flow of light and shadow.
        </p>
        
        <a href="#" class="btn">ENTER THE DREAM</a>
    </main>

    <!-- 底部装饰 -->
    <div class="footer-line"></div>

    <script>
        // 鼠标交互效果 - 轻微影响极光
        document.addEventListener('mousemove', (e) => {
            const auroraBands = document.querySelectorAll('.aurora-band');
            const x = (e.clientX - window.innerWidth / 2) / 400;
            const y = (e.clientY - window.innerHeight / 2) / 400;

            auroraBands.forEach((band, index) => {
                const speed = (index + 1) * 0.15;
                // 保存原始动画，只添加轻微的鼠标偏移
                band.style.marginLeft = x * speed + 'px';
                band.style.marginTop = y * speed + 'px';
            });

            const auroraGlow = document.querySelector('.aurora-glow');
            auroraGlow.style.transform = `translate(${x * 2}px, ${y * 2}px) scale(1.1)`;
        });
    </script>
</body>
</html>
