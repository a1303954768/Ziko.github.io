<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大范围霓虹光流背景</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 固定背景层，纯黑底色 */
        #neon-flow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            z-index: -1;
        }
        /* 内容层，确保在背景上方 */
        .content {
            position: relative;
            z-index: 1;
            color: #ffffff;
            padding: 80px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <canvas id="neon-flow-bg"></canvas>
    <div class="content">
        <h1>Innovation and Growth</h1>
    </div>

    <script>
        const canvas = document.getElementById('neon-flow-bg');
        const ctx = canvas.getContext('2d');

        // 自适应窗口大小
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 核心配置（和你图里的质感匹配）
        const config = {
            layers: 3,          // 光带层数（越多越丰富）
            speed: 0.002,       // 流动速度（越小越慢，更柔和）
            colors: [
                '#00d8ff',      // 主霓虹蓝（和图里的青蓝一致）
                '#6a00ff',      // 副霓虹紫
                '#ff00cc'       // 点缀粉紫
            ],
            amplitude: 0.15,    // 波浪幅度（越大光带越宽）
            frequency: 0.02,    // 波浪频率（越大波纹越密）
            opacity: 0.3        // 光带透明度（越小越朦胧）
        };

        let time = 0;

        function draw() {
            // 用半透明清空，制造拖影丝滑感
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let l = 0; l < config.layers; l++) {
                const layerSpeed = config.speed * (l + 1) * 0.6;
                const layerColor = config.colors[l % config.colors.length];
                const layerAmp = config.amplitude * (1 - l * 0.2);

                ctx.beginPath();
                ctx.moveTo(0, canvas.height / 2);

                for (let x = 0; x < canvas.width; x++) {
                    const y = 
                        canvas.height / 2 +
                        Math.sin(x * config.frequency + time * layerSpeed) * 
                        canvas.height * layerAmp * (l + 1) / config.layers;
                    
                    ctx.lineTo(x, y);
                }

                // 向下延伸到屏幕底部，形成光带区域
                ctx.lineTo(canvas.width, canvas.height);
                ctx.lineTo(0, canvas.height);
                ctx.closePath();

                // 渐变填充 + 发光效果
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, layerColor);
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.globalAlpha = config.opacity;
                ctx.shadowColor = layerColor;
                ctx.shadowBlur = 40; // 大范围弥散发光
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }

            time += 1;
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
