<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHYSL DESIGN - Future Vision</title>
    <style>
        /* --- 基础设置 --- */
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff0055;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- 背景光流效果 (核心部分) --- */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }

        /* 光球通用样式 - 减少虚化 */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px); /* 从 80px 减少到 40px，清晰度提高 */
            opacity: 0.7; /* 提高透明度 */
            animation: float 10s infinite ease-in-out; /* 从 20s 加快到 10s */
            mix-blend-mode: screen;
        }

        /* 光球 1：蓝色 - 加快速度 */
        .orb-1 {
            top: -10%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.5) 0%, rgba(0, 0, 0, 0) 70%);
            animation-delay: 0s;
            animation-duration: 8s; /* 从 20s 加快到 8s */
        }

        /* 光球 2：紫色/粉色 - 加快速度 */
        .orb-2 {
            bottom: -20%;
            right: -10%;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.5) 0%, rgba(0, 0, 0, 0) 70%);
            animation-delay: -3s;
            animation-duration: 12s; /* 从 25s 加快到 12s */
        }

        /* 光球 3：流动的光带感 - 加快速度 */
        .orb-3 {
            top: 40%;
            left: 40%;
            width: 50vw;
            height: 30vw;
            background: linear-gradient(90deg, rgba(255, 0, 85, 0.4), rgba(0, 242, 255, 0.4));
            border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%;
            animation: morph 8s infinite ease-in-out; /* 从 15s 加快到 8s */
            opacity: 0.6;
        }

        /* 噪点纹理层 */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        /* --- 动画定义 - 加快速度 --- */
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(50px, -80px) rotate(15deg); } /* 增加移动距离 */
            66% { transform: translate(-30px, 40px) rotate(-10deg); } /* 增加移动距离 */
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        @keyframes morph {
            0% { border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; transform: translate(0, 0) scale(1); }
            50% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; transform: translate(-80px, -50px) scale(1.15); } /* 增加移动距离 */
            100% { border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; transform: translate(0, 0) scale(1); }
        }

        /* --- 前景内容卡片 (玻璃拟态) --- */
        .content-card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 4rem 6rem;
            background: rgba(255, 255, 255, 0.05); /* 稍微提高透明度 */
            backdrop-filter: blur(15px); /* 从 20px 减少到 15px */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15); /* 提高边框透明度 */
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 800px;
            transition: transform 0.3s ease;
        }

        .content-card:hover {
            transform: translateY(-5px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        /* 顶部小字 */
        .top-label {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: block;
        }

        .year-badge {
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.4); /* 提高边框可见度 */
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-right: 10px;
            vertical-align: middle;
        }

        /* 主标题 */
        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin: 0.5rem 0;
            background: linear-gradient(to right, #fff, #a5a5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2); /* 稍微增强光晕 */
        }

        /* 副标题 */
        .subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--neon-blue);
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 25px rgba(0, 242, 255, 0.6); /* 增强霓虹效果 */
        }

        /* 描述文本 */
        p.description {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.95rem;
            max-width: 600px;
            margin: 0 auto 3rem auto;
        }

        /* 按钮 */
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.15); /* 提高背景可见度 */
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3); /* 提高边框可见度 */
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
        }

        .btn:hover::before {
            left: 100%;
        }

        /* 底部装饰线 */
        .footer-line {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.6));
            animation: pulseLine 1.5s infinite; /* 加快脉冲速度 */
        }

        @keyframes pulseLine {
            0%, 100% { opacity: 0.4; height: 40px; }
            50% { opacity: 1; height: 60px; }
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .content-card { padding: 3rem 2rem; width: 90%; }
            .orb { filter: blur(35px); } /* 移动端也减少虚化 */
        }
    </style>
</head>
<body>

    <!-- 背景层 -->
    <div class="ambient-light" id="ambientLight">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    
    <!-- 噪点层 -->
    <div class="noise-overlay"></div>

    <!-- 主要内容 -->
    <main class="content-card">
        <span class="top-label">
            <span class="year-badge">2025</span> VISUAL DESIGN BY WHYSL
        </span>
        
        <h1>WHYSL DESIGN</h1>
        
        <div class="subtitle">Draw The Color Of The Dream</div>
        
        <p class="description">
            探索视觉的边界，捕捉光影的流动。我们致力于创造超越现实的数字体验，
            将霓虹梦境转化为触手可及的视觉艺术。
            <br><br>
            Explore the boundaries of vision and capture the flow of light and shadow.
        </p>
        
        <a href="#" class="btn">ENTER THE DREAM</a>
    </main>

    <!-- 底部装饰 -->
    <div class="footer-line"></div>

    <script>
        // 鼠标视差效果
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.orb');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            orbs.forEach((orb, index) => {
                const speed = (index + 1) * 15; // 稍微提高视差响应速度
                const xOffset = (window.innerWidth / 2 - e.clientX) / speed;
                const yOffset = (window.innerHeight / 2 - e.clientY) / speed;
                
                orb.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
            });
        });
    </script>
</body>
</html>
