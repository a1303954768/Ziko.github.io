<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHYSL DESIGN - Future Vision</title>
    <style>
        /* --- 基础设置 --- */
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff0055;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- 背景光流效果 (核心部分) --- */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }

        /* 光球通用样式 */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px); /* 关键：巨大的模糊产生弥散感 */
            opacity: 0.6;
            animation: float 20s infinite ease-in-out;
            mix-blend-mode: screen; /* 混合模式让颜色叠加更亮 */
        }

        /* 光球 1：蓝色 */
        .orb-1 {
            top: -10%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.4) 0%, rgba(0, 0, 0, 0) 70%);
            animation-delay: 0s;
        }

        /* 光球 2：紫色/粉色 */
        .orb-2 {
            bottom: -20%;
            right: -10%;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.4) 0%, rgba(0, 0, 0, 0) 70%);
            animation-delay: -5s;
            animation-duration: 25s;
        }

        /* 光球 3：流动的光带感 (扁长形) */
        .orb-3 {
            top: 40%;
            left: 40%;
            width: 50vw;
            height: 30vw;
            background: linear-gradient(90deg, rgba(255, 0, 85, 0.3), rgba(0, 242, 255, 0.3));
            border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; /* 不规则形状模拟流体 */
            animation: morph 15s infinite ease-in-out;
            opacity: 0.5;
        }

        /* 噪点纹理层 (增加电影质感) */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        /* --- 动画定义 --- */
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -50px) rotate(10deg); }
            66% { transform: translate(-20px, 20px) rotate(-5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        @keyframes morph {
            0% { border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; transform: translate(0, 0) scale(1); }
            50% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; transform: translate(-50px, -30px) scale(1.1); }
            100% { border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; transform: translate(0, 0) scale(1); }
        }

        /* --- 前景内容卡片 (玻璃拟态) --- */
        .content-card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 4rem 6rem;
            background: rgba(255, 255, 255, 0.03); /* 极低透明度 */
            backdrop-filter: blur(20px); /* 磨砂玻璃效果 */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 800px;
            transition: transform 0.3s ease;
        }

        .content-card:hover {
            transform: translateY(-5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 顶部小字 */
        .top-label {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: block;
        }

        .year-badge {
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-right: 10px;
            vertical-align: middle;
        }

        /* 主标题 */
        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin: 0.5rem 0;
            background: linear-gradient(to right, #fff, #a5a5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        /* 副标题 */
        .subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--neon-blue);
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        /* 描述文本 */
        p.description {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.95rem;
            max-width: 600px;
            margin: 0 auto 3rem auto;
        }

        /* 按钮 */
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .btn:hover::before {
            left: 100%;
        }

        /* 底部装饰线 */
        .footer-line {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.5));
            animation: pulseLine 2s infinite;
        }

        @keyframes pulseLine {
            0%, 100% { opacity: 0.3; height: 40px; }
            50% { opacity: 1; height: 60px; }
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .content-card { padding: 3rem 2rem; width: 90%; }
            .orb { filter: blur(60px); }
        }
    </style>
</head>
<body>

    <!-- 背景层 -->
    <div class="ambient-light" id="ambientLight">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    
    <!-- 噪点层 -->
    <div class="noise-overlay"></div>

    <!-- 主要内容 -->
    <main class="content-card">
        <span class="top-label">
            <span class="year-badge">2025</span> VISUAL DESIGN BY WHYSL
        </span>
        
        <h1>WHYSL DESIGN</h1>
        
        <div class="subtitle">Draw The Color Of The Dream</div>
        
        <p class="description">
            探索视觉的边界，捕捉光影的流动。我们致力于创造超越现实的数字体验，
            将霓虹梦境转化为触手可及的视觉艺术。
            <br><br>
            Explore the boundaries of vision and capture the flow of light and shadow.
        </p>
        
        <a href="#" class="btn">ENTER THE DREAM</a>
    </main>

    <!-- 底部装饰 -->
    <div class="footer-line"></div>

    <script>
        // 简单的鼠标视差效果，增加高级感
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.orb');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            orbs.forEach((orb, index) => {
                const speed = (index + 1) * 20; // 不同光球移动速度不同
                const xOffset = (window.innerWidth / 2 - e.clientX) / speed;
                const yOffset = (window.innerHeight / 2 - e.clientY) / speed;
                
                // 在原有动画基础上叠加鼠标位移
                // 注意：这里直接修改transform会覆盖CSS动画，所以我们需要用变量或者只修改margin/translate
                // 为了简单且不影响CSS animation，我们修改 margin 或者使用 CSS 变量
                orb.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
            });
        });

        // 恢复CSS动画的transform（上面的JS会覆盖CSS animation的transform，这里做一个兼容处理比较复杂）
        // 简化方案：只让背景容器轻微移动，或者让光球在CSS animation的基础上再叠加
        // 下面的代码是更稳健的视差方案：移动整个背景容器
        /* 
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2) / 50;
            const y = (e.clientY - window.innerHeight / 2) / 50;
            document.querySelector('.ambient-light').style.transform = `translate(${x}px, ${y}px) scale(1.1)`;
        });
        */
    </script>
</body>
</html>
